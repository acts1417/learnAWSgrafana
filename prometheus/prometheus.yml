global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: nvidia_gpu
    static_configs:
      - targets: ['nvidia-gpu-exporter:9835']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
